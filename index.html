<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лучший мем</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 12px 16px 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            overflow: hidden;
        }

        /* ---------- СТАРТОВЫЙ ЭКРАН ---------- */
        #startScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 12px;
        }
        #startScreen h1 {
            font-size: 3.2rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -1px;
            margin: 0;
        }
        #startScreen .prize {
            font-size: 2rem;
            font-weight: 700;
            color: #0b7e4b;
            background: rgba(11, 126, 75, 0.1);
            padding: 8px 30px;
            border-radius: 60px;
            margin: 6px 0 12px;
        }
        .start-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .start-btn:hover {
            background: #4338ca;
            transform: scale(1.02);
        }
        .start-btn:active {
            transform: scale(0.96);
        }

        /* ---------- ИГРОВОЙ РЕЖИМ ---------- */
        .game-area {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .game-area.active {
            display: flex;
        }

        h1.game-title {
            font-weight: 700;
            font-size: 1.6rem;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin: 0 0 2px 0;
        }
        .subtitle {
            color: #475569;
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0 0 8px 0;
        }

        .battle {
            display: flex;
            flex: 1;
            gap: 12px;
            min-height: 0;
            overflow: hidden;
        }
        .block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.2s ease, border-color 0.2s ease; /* убрал transform */
            cursor: pointer;
            user-select: none;
            border: 2px solid transparent;
            justify-content: center;
            align-items: center;
            min-height: 0;
            overflow: hidden;
            position: relative; /* для z-index при необходимости */
        }
        .block:hover {
            /* transform: scale(1.01);  УБРАНО – не выходит за границы */
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.15);
            border-color: #818cf8;
        }
        .block:active {
            transform: scale(0.97);
        }
        .block .image-wrapper {
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            border-radius: 14px;
            overflow: hidden;
        }
        .block img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        /* ---------- ПОБЕДИТЕЛЬ ---------- */
        .winner {
            display: none;
            margin: 0;
            padding: 10px 12px;
            background: #dbeafe;
            border-radius: 24px;
            animation: fadeUp 0.5s ease;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: center;
            overflow: hidden;
        }
        .winner.show {
            display: flex;
        }
        .winner h2 {
            font-size: 1.6rem;
            color: #1e3a8a;
            margin: 0 0 6px 0;
        }
        .winner .meme-photo {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            flex: 1;
            align-items: center;
            overflow: hidden;
        }
        .winner .meme-photo img {
            max-width: 42%;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            flex: 0 1 auto;
        }
        .winner p {
            margin: 6px 0 0 0;
            font-size: 1rem;
            color: #1e293b;
        }
        .restart-btn {
            margin-top: 10px;
            background: #0b7e4b;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(11, 126, 75, 0.3);
        }
        .restart-btn:hover {
            background: #0a6a3f;
            transform: scale(1.02);
        }
        .restart-btn:active {
            transform: scale(0.96);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .container { padding: 8px 10px 8px; border-radius: 20px; }
            #startScreen h1 { font-size: 2.4rem; }
            #startScreen .prize { font-size: 1.6rem; padding: 6px 16px; }
            .start-btn { font-size: 1.3rem; padding: 12px 30px; }
            h1.game-title { font-size: 1.3rem; }
            .subtitle { font-size: 0.8rem; }
            .battle { gap: 8px; flex-direction: column; }
            .block { padding: 6px; }
            .block .image-wrapper { min-height: 80px; }
            .winner .meme-photo img {
                max-width: 90%;
                max-height: 35vh;
            }
        }
    </style>
</head>
<body>

        <!-- Блок info УДАЛЁН -->

        <div class="winner" id="winner">

                photo: 'https://i.ibb.co/hJKVnzBp/german-beer.jpg'

            {
                meme: 'https://i.ibb.co/QFQZy623/image.jpg', //ты больше не армянин
                photo: 'https://i.ibb.co/hJKVnzBp/german-beer.jpg'
            }
        ];

        // DOM-элементы
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const gameArea = document.getElementById('gameArea');

        const leftMeme = document.getElementById('leftMeme');
        const leftPhoto = document.getElementById('leftPhoto');
        const rightMeme = document.getElementById('rightMeme');
        const rightPhoto = document.getElementById('rightPhoto');
        const leftBlock = document.getElementById('leftBlock');
        const rightBlock = document.getElementById('rightBlock');
        const battleContainer = document.getElementById('battleContainer');
        const winnerBlock = document.getElementById('winner');
        const winnerMeme = document.getElementById('winnerMeme');
        const winnerPhoto = document.getElementById('winnerPhoto');
        const winnerText = document.getElementById('winnerText');
        const restartBtn = document.getElementById('restartBtn');

        let gameOrder = [];
        let champion = null;
        let championSide = 'left';
        let nextIndex = 0;
        let gameActive = false;
        let gameStarted = false;

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showWinner(block) {
            gameActive = false;
            winnerMeme.src = block.meme;
            winnerPhoto.src = block.photo;
            winnerText.textContent = 'Абсолютный чемпион!';
            winnerBlock.classList.add('show');
            winnerBlock.style.display = 'flex';
            battleContainer.style.display = 'none';
            leftBlock.style.display = 'none';
            rightBlock.style.display = 'none';
            leftMeme.src = '';
            leftPhoto.src = '';
            rightMeme.src = '';
            rightPhoto.src = '';
            leftBlock.style.cursor = 'default';
            rightBlock.style.cursor = 'default';
        }

        function updateBattle() {
            if (!gameActive) return;
            if (nextIndex >= gameOrder.length) {
                showWinner(champion);
                return;
            }
            const challenger = gameOrder[nextIndex];
            if (championSide === 'left') {
                leftMeme.src = champion.meme;
                leftPhoto.src = champion.photo;
                rightMeme.src = challenger.meme;
                rightPhoto.src = challenger.photo;
            } else {
                leftMeme.src = challenger.meme;
                leftPhoto.src = challenger.photo;
                rightMeme.src = champion.meme;
                rightPhoto.src = champion.photo;
            }
        }

        function chooseSide(side) {
            if (!gameActive) return;
            if (side === 'left') {
                if (championSide !== 'left') {
                    champion = { meme: leftMeme.src, photo: leftPhoto.src };
                    championSide = 'left';
                }
            } else {
                if (championSide !== 'right') {
                    champion = { meme: rightMeme.src, photo: rightPhoto.src };
                    championSide = 'right';
                }
            }
            nextIndex++;
            updateBattle();
        }

        function startGame() {
            if (blocks.length === 0) {
                return;
            }
            gameOrder = shuffleArray([...blocks]);
            if (gameOrder.length === 1) {
                showWinner(gameOrder[0]);
                return;
            }
            champion = gameOrder[0];
            championSide = 'left';
            nextIndex = 1;
            gameActive = true;
            winnerBlock.classList.remove('show');
            winnerBlock.style.display = 'none';
            battleContainer.style.display = 'flex';
            leftBlock.style.display = 'flex';
            rightBlock.style.display = 'flex';
            leftBlock.style.cursor = 'pointer';
            rightBlock.style.cursor = 'pointer';
            updateBattle();
        }

        function enterGame() {
            if (gameStarted) return;
            gameStarted = true;
            startScreen.style.display = 'none';
            gameArea.classList.add('active');
            startGame();
        }

        startBtn.addEventListener('click', enterGame);
        leftBlock.addEventListener('click', function() { if (gameActive) chooseSide('left'); });
        rightBlock.addEventListener('click', function() { if (gameActive) chooseSide('right'); });
        restartBtn.addEventListener('click', function() {
            if (!gameStarted) return;
            winnerBlock.classList.remove('show');
            winnerBlock.style.display = 'none';
            battleContainer.style.display = 'flex';
            leftBlock.style.display = 'flex';
            rightBlock.style.display = 'flex';
            startGame();
        });

        // Инициализация
        startScreen.style.display = 'flex';
        gameArea.classList.remove('active');
        gameActive = false;
        gameStarted = false;

        leftPhoto.src = '';
        rightMeme.src = '';
        rightPhoto.src = '';
        winnerMeme.src = '';
        winnerPhoto.src = '';
        winnerBlock.classList.remove('show');
        winnerBlock.style.display = 'none';
        battleContainer.style.display = 'none';
        leftBlock.style.display = 'none';
        rightBlock.style.display = 'none';
    })();
